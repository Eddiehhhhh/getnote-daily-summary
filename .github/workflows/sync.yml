name: Sync Daily Summary

on:
  schedule:
    # 高频时段：21:00~04:00 (UTC+8)，每 5 分钟 = 13:00~20:00 UTC
    - cron: '*/5 13-19 * * *'
    # 低频时段：04:00~21:00 (UTC+8)，每 2 小时 = 20:00,22:00,0:00,4:00,6:00,8:00,10:00,12:00 UTC
    - cron: '0 20,22,0,2,4,6,8,10,12 * * *'
  workflow_dispatch: # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync Get笔记 → Notion
        env:
          GETNOTE_API_KEY: ${{ secrets.GETNOTE_API_KEY }}
          GETNOTE_CLIENT_ID: ${{ secrets.GETNOTE_CLIENT_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: python sync.py
