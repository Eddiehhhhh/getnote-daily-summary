name: Sync Daily Summary

on:
  schedule:
    # 高频时段：21:00~04:00 (UTC+8) = UTC 13:00~20:00，每 5 分钟
    - cron: '*/5 13-20 * * *'
    # 低频时段：04:00~21:00 (UTC+8) = UTC 20:00~13:00，每 2 小时
    # UTC 20,22,0,2,4,6,8,10,12
    - cron: '0 0,2,4,6,8,10,12,22 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pynacl

      - name: Sync Get笔记 → AI分析 → Notion
        env:
          GETNOTE_API_KEY: ${{ secrets.GETNOTE_API_KEY }}
          GETNOTE_CLIENT_ID: ${{ secrets.GETNOTE_CLIENT_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python sync.py
